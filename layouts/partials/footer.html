
<div class="site-footer">

  <ul class="site-footer-items">
    {{- with .OutputFormats.Get "RSS" }}

      <a href="{{ .RelPermalink }}" type="application/rss+xml" target="_blank" title="RSS">
        <i class="fa-solid fa-rss"></i>
      </a>
    </li>
    {{- end }}
        {{- range .Site.Menus.footer }}

    {{- end }}

  </div>

{{ template "_internal/google_analytics.html" . }}

<script>
document.addEventListener("DOMContentLoaded", function () {
  const elements = document.querySelectorAll(".typed-text");

  elements.forEach((el) => {
    const speed = parseInt(el.dataset.typedSpeed || "50", 10);
    const pause = parseInt(el.dataset.typedPause || "600", 10);

    // Capture original HTML and let the browser parse it
    const sourceHtml = el.innerHTML.trim();
    const temp = document.createElement("div");
    temp.innerHTML = sourceHtml;

    // Clear the target; we'll rebuild it, typed
    el.innerHTML = "";

    function typeNodeList(nodes, targetParent, done) {
      let idx = 0;

      function nextNode() {
        if (idx >= nodes.length) {
          done();
          return;
        }

        const node = nodes[idx++];

        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;
          if (!text.length) {
            nextNode();
            return;
          }

          const targetTextNode = document.createTextNode("");
          targetParent.appendChild(targetTextNode);

          let charPos = 0;
          (function typeChar() {
            if (charPos < text.length) {
              targetTextNode.textContent += text[charPos++];
              setTimeout(typeChar, speed);
            } else {
              nextNode();
            }
          })();

        } else if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.tagName === "BR") {
            // Pause at line breaks
            setTimeout(() => {
              targetParent.appendChild(document.createElement("br"));
              nextNode();
            }, pause);
          } else {
            // Clone the element and recurse into its children
            const clone = document.createElement(node.tagName);
            Array.from(node.attributes).forEach(attr => {
              clone.setAttribute(attr.name, attr.value);
            });
            targetParent.appendChild(clone);
            typeNodeList(Array.from(node.childNodes), clone, nextNode);
          }

        } else {
          // Skip other node types
          nextNode();
        }
      }

      nextNode();
    }

    typeNodeList(Array.from(temp.childNodes), el, function () {
      // done for this element
    });
  });
});
</script>
